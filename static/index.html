<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Prediction</title>
    <style>
        :root {
            --card: #fffaf2;
            --text: #222222;
            --accent: #0d6b5f;
            --accent-soft: #d7efe9;
            --border: #d8cdbb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background:
                radial-gradient(circle at top left, #f9e7c2 0, transparent 25%),
                linear-gradient(135deg, #f7efe0 0%, #eef5ef 100%);
            color: var(--text);
        }

        .page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px 16px;
        }

        .card {
            width: 100%;
            max-width: 920px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(34, 34, 34, 0.08);
            overflow: hidden;
        }

        .hero {
            padding: 32px;
            background: linear-gradient(135deg, #163832 0%, #25564b 100%);
            color: #f7f3ea;
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .hero p {
            margin: 0;
            max-width: 640px;
            line-height: 1.5;
        }

        form {
            padding: 32px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
        }

        input,
        select,
        button {
            width: 100%;
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 12px 14px;
            font: inherit;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
        }

        button {
            max-width: 220px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .result {
            margin: 0 32px 32px;
            padding: 24px;
            border-radius: 18px;
            background: var(--accent-soft);
            border: 1px solid #b9ddd5;
            display: none;
        }

        .result.visible {
            display: block;
        }

        .amount {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            margin: 8px 0 0;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card">
            <div class="hero">
                <h1>Prediccion Salarial</h1>
                <p>Completa el formulario y envia los datos al backend de FastAPI para obtener una estimacion salarial.</p>
            </div>

            <form id="salary-form">
                <div class="grid">
                    <div>
                        <label for="job_title">Cargo</label>
                        <select id="job_title" name="job_title" required>
                            <option value="AI Engineer">AI Engineer</option>
                            <option value="Data Scientist">Data Scientist</option>
                            <option value="ML Engineer">ML Engineer</option>
                            <option value="Data Analyst">Data Analyst</option>
                            <option value="Software Engineer">Software Engineer</option>
                            <option value="Product Manager">Product Manager</option>
                        </select>
                    </div>

                    <div>
                        <label for="experience_years">Anos de experiencia</label>
                        <input id="experience_years" name="experience_years" type="number" min="0" required>
                    </div>

                    <div>
                        <label for="education_level">Nivel educativo</label>
                        <select id="education_level" name="education_level" required>
                            <option value="High School">High School</option>
                            <option value="Bachelor">Bachelor</option>
                            <option value="Master">Master</option>
                            <option value="PhD">PhD</option>
                        </select>
                    </div>

                    <div>
                        <label for="skills_count">Cantidad de skills</label>
                        <input id="skills_count" name="skills_count" type="number" min="0" required>
                    </div>

                    <div>
                        <label for="industry">Industria</label>
                        <select id="industry" name="industry" required>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Finance">Finance</option>
                            <option value="Technology">Technology</option>
                            <option value="Retail">Retail</option>
                            <option value="Education">Education</option>
                        </select>
                    </div>

                    <div>
                        <label for="company_size">Tamano de empresa</label>
                        <select id="company_size" name="company_size" required>
                            <option value="Small">Small</option>
                            <option value="Medium">Medium</option>
                            <option value="Large">Large</option>
                        </select>
                    </div>

                    <div>
                        <label for="location">Ubicacion</label>
                        <select id="location" name="location" required>
                            <option value="India">India</option>
                            <option value="USA">USA</option>
                            <option value="Germany">Germany</option>
                            <option value="Canada">Canada</option>
                            <option value="Remote">Remote</option>
                        </select>
                    </div>

                    <div>
                        <label for="remote_work">Modalidad</label>
                        <select id="remote_work" name="remote_work" required>
                            <option value="Onsite">Onsite</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="Remote">Remote</option>
                        </select>
                    </div>

                    <div>
                        <label for="certifications">Certificaciones</label>
                        <input id="certifications" name="certifications" type="number" min="0" required>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit">Predecir salario</button>
                </div>
            </form>

            <section id="result" class="result">
                <h2>Resultado</h2>
                <p>Estimacion salarial generada por el modelo:</p>
                <p id="prediction" class="amount"></p>
            </section>
        </section>
    </main>

    <script>
        const form = document.getElementById("salary-form");
        const result = document.getElementById("result");
        const prediction = document.getElementById("prediction");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const payload = {
                job_title: form.job_title.value,
                experience_years: Number(form.experience_years.value),
                education_level: form.education_level.value,
                skills_count: Number(form.skills_count.value),
                industry: form.industry.value,
                company_size: form.company_size.value,
                location: form.location.value,
                remote_work: form.remote_work.value,
                certifications: Number(form.certifications.value)
            };

            const response = await fetch("/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            prediction.textContent = data.prediction;
            result.classList.add("visible");
        });
    </script>
</body>
</html>
