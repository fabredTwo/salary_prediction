version: 0.2

phases:
  pre_build:
    commands:
      - echo Actualizando Lambda...
      - aws lambda update-function-code --function-name PredictionSalary --image-uri 997141224904.dkr.ecr.us-east-1.amazonaws.com/imagesalary:latest --region us-east-1
      - aws lambda wait function-updated --function-name PredictionSalary --region us-east-1

  build:
    commands:
      - echo Subiendo HTML a S3...
      - aws s3 cp index.html s3://sandro-aws-estudio-s3-001/SalaryPredict/index.html --content-type "text/html" --region us-east-2

  post_build:
    commands:
      - echo Invalidando cache de CloudFront...
      - aws cloudfront create-invalidation --distribution-id E17DXWUAJXN59I --paths "/*"
